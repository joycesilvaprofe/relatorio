<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relatório Diário de Tarefas NOW</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="container">

  <!-- Header -->
  <header class="app-header">
    <h1>
      <i class="ti ti-clipboard-list" style="font-size:22px;vertical-align:-3px;margin-right:6px;color:#6366f1"></i>
      Relatório diário
    </h1>
    <p id="date-label"></p>
  </header>

  <!-- Stats -->
  <div class="stats">
    <div class="stat">
      <div class="stat-label">Total</div>
      <div class="stat-value" id="s-total">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Concluídas</div>
      <div class="stat-value" id="s-done">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Em andamento</div>
      <div class="stat-value" id="s-progress">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Tempo total</div>
      <div class="stat-value" id="s-time">0h</div>
    </div>
  </div>

  <!-- Formulário -->
  <div class="section">
    <div class="section-label">Nova tarefa</div>
    <div class="card">
      <div class="form-grid-2">
        <input type="text" id="task-input" placeholder="Descrição da tarefa..." />
        <input type="text" id="proj-input" placeholder="Projeto / categoria" />
      </div>
      <textarea id="obs-input" placeholder="Observações (opcional)..."></textarea>
      <div class="form-row">
        <input type="number" id="time-input" min="0" step="0.5" placeholder="Horas" />
        <select id="status-select">
          <option value="done">✅ Concluído</option>
          <option value="progress">🔄 Em andamento</option>
          <option value="pending" selected>⏳ Pendente</option>
          <option value="blocked">🚫 Bloqueado</option>
        </select>
        <select id="priority-select">
          <option value="high">🔴 Alta</option>
          <option value="medium" selected>🟡 Média</option>
          <option value="low">🟢 Baixa</option>
        </select>
      </div>
      <div class="btn-add-row">
        <button class="btn btn-primary" onclick="addTask()">
          <i class="ti ti-plus"></i> Adicionar tarefa
        </button>
      </div>
    </div>
  </div>

  <!-- Filtros e lista -->
  <div class="section">
    <div class="section-label">Filtrar por status</div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('done', this)">✅ Concluídas</button>
      <button class="filter-btn" onclick="setFilter('progress', this)">🔄 Em andamento</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">⏳ Pendentes</button>
      <button class="filter-btn" onclick="setFilter('blocked', this)">🚫 Bloqueadas</button>
    </div>
    <div class="task-list" id="task-list">
      <div class="empty">Nenhuma tarefa adicionada ainda.</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Relatório -->
  <div class="section" id="report-section">
    <div class="section-label">Relatório gerado</div>
    <div class="report-card">
      <div class="report-header">
        <div class="report-title">
          <i class="ti ti-file-text" style="font-size:17px;color:#6366f1"></i>
          <span id="report-source">Relatório de hoje</span>
        </div>
        <div class="report-actions">
          <button class="btn btn-secondary" onclick="copyReport()" id="copy-btn">
            <i class="ti ti-copy"></i> Copiar
          </button>
          <button class="btn btn-secondary" onclick="printReport()">
            <i class="ti ti-printer"></i> Imprimir / PDF
          </button>
        </div>
      </div>
      <div class="report-text" id="report-text">Adicione tarefas para gerar o relatório.</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- Histórico -->
  <div class="section">
    <div class="section-label">Histórico (últimos 30 dias)</div>
    <div class="task-list" id="history-list">
      <div class="empty">Nenhum dia arquivado ainda.</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
